<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AssetTrack">
<meta name="theme-color" content="#0f172a">
<title>AssetTrack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263246;--border:#334155;
  --accent:#38bdf8;--accent-dim:#0c4a6e;
  --green:#22c55e;--green-dim:#14532d;
  --amber:#f59e0b;--amber-dim:#78350f;
  --red:#ef4444;--red-dim:#7f1d1d;
  --purple:#a78bfa;--purple-dim:#3b0764;
  --text:#f1f5f9;--muted:#94a3b8;--hint:#475569;
  --mono:monospace;--sans:sans-serif;
  --r:12px;--rs:8px;--rx:18px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;padding-bottom:80px}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.logo span{color:var(--muted);font-weight:400}
.hdr-acts{display:flex;gap:8px}
.ibtn{width:38px;height:38px;border-radius:var(--rs);background:var(--surface2);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;color:var(--muted);font-size:11px;gap:4px;border:none;background:none}
.bnav-item.active{color:var(--accent)}
.view{display:none;padding:16px}
.view.active{display:block}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:28px;font-weight:700}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:11px 14px 11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--hint)}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;cursor:pointer}
.chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.asset-list{display:flex;flex-direction:column;gap:10px}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer}
.acard:active{border-color:var(--accent)}
.acard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.acard-id{font-size:11px;color:var(--accent);font-weight:600}
.acard-desc{font-size:15px;font-weight:600;margin-bottom:4px}
.acard-serial{font-size:12px;color:var(--muted);margin-bottom:8px}
.acard-meta{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.b-type{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.b-new{background:#1a2e1a;color:var(--green);border:1px solid var(--green-dim)}
.b-good{background:#162032;color:var(--accent);border:1px solid var(--accent-dim)}
.b-repair{background:#2d1f0a;color:var(--amber);border:1px solid var(--amber-dim)}
.b-disposal{background:#2d1010;color:var(--red);border:1px solid var(--red-dim)}
.b-active{background:#1a2e1a;color:var(--green);border:1px solid var(--green-dim)}
.b-inactive{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.b-storage{background:#1c1c2e;color:var(--purple);border:1px solid var(--purple-dim)}
.b-deployed{background:#162032;color:var(--accent);border:1px solid var(--accent-dim)}
.b-underrepair{background:#2d1f0a;color:var(--amber);border:1px solid var(--amber-dim)}
.b-disposed{background:#2d1010;color:var(--red);border:1px solid var(--red-dim)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.fsec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.req{color:var(--red);margin-left:2px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--hint)}
.scan-row{display:flex;gap:8px}
.scan-row input{flex:1}
.scan-btn{padding:11px 14px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--rs);color:var(--accent);font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer}
.scan-btn:active{background:var(--accent);color:#000}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--accent);border-top:none;border-radius:0 0 var(--rs) var(--rs);z-index:300;max-height:180px;overflow-y:auto}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--surface2)}
.ac-new{color:var(--accent);font-style:italic}
.btn{width:100%;padding:14px;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-primary:active{opacity:.85}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid var(--red)}
.btn-secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}
.detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.detail-desc{font-size:20px;font-weight:700;margin-bottom:4px}
.detail-serial{font-size:13px;color:var(--muted);margin-bottom:12px}
.detail-badges{display:flex;gap:8px;flex-wrap:wrap}
.detail-fields{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.detail-row{display:flex;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:13px;color:var(--muted);min-width:110px;flex-shrink:0}
.detail-val{font-size:14px;color:var(--text);word-break:break-word}
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.export-card h3{font-size:16px;font-weight:600;margin-bottom:6px}
.export-card p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.scanner-overlay{position:fixed;inset:0;background:#000;z-index:500;display:flex;flex-direction:column}
.scanner-header{padding:16px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.7)}
.scanner-title{font-size:16px;font-weight:600;color:#fff}
.scanner-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer}
.scanner-viewport{flex:1;position:relative;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center}

@keyframes scan{0%,100%{top:15%}50%{top:80%}}
.scanner-hint{color:#fff;font-size:14px;text-align:center;padding:16px;background:rgba(0,0,0,.6)}
.scanner-manual{padding:16px;background:rgba(0,0,0,.7)}
.scanner-manual input{width:100%;padding:12px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:var(--rs);color:#fff;font-size:15px;outline:none;margin-bottom:8px}
.scanner-manual input::placeholder{color:rgba(255,255,255,.4)}
.scanner-manual-btn{width:100%;padding:12px;background:var(--accent);color:#0f172a;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:var(--rx);padding:12px 20px;font-size:14px;font-weight:500;z-index:600;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.fab{position:fixed;bottom:90px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0f172a;border:none;font-size:28px;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center}
.fab:active{opacity:.85}
.sec-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px;background:none;border:none;padding:0}
.mb8{margin-bottom:8px}
.expfield{margin-bottom:12px}
.expfield label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.expfield select{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;appearance:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Asset<span>Track</span></div>
  <div class="hdr-acts">
    <div class="ibtn" onclick="showExport()" title="Export">&#8659;</div>
  </div>
</div>
<div id="view-home" class="view active">
  <div class="stats" id="stats-row"></div>
  <div class="sec-title">All assets</div>
  <div class="search-wrap">
    <input type="search" placeholder="Search description, serial, model..." id="search-input" oninput="renderList()">
  </div>
  <div class="chips" id="filter-chips"></div>
  <div class="asset-list" id="asset-list"></div>
</div>
<div id="view-add" class="view">
  <div class="sec-title" id="form-title">New asset</div>
  <div class="form-section">
    <div class="fsec-title">Identification</div>
    <div class="field">
      <label>Serial number<span class="req">*</span></label>
      <div class="scan-row">
        <input type="text" id="f-serial" placeholder="Scan or type serial..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="scan-btn" onclick="openScanner()">&#9636; Scan</button>
      </div>
    </div>
    <div class="field">
      <label>Type<span class="req">*</span></label>
      <div class="ac-wrap">
        <input type="text" id="f-type" placeholder="e.g. Laptop, Monitor..." oninput="onAcInput(this,'Type')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Type" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>Description<span class="req">*</span></label>
      <div class="ac-wrap">
        <input type="text" id="f-description" placeholder="e.g. Dell Latitude 14..." oninput="onAcInput(this,'Description')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Description" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="form-section">
    <div class="fsec-title">Hardware details</div>
    <div class="field">
      <label>Manufacturer</label>
      <div class="ac-wrap">
        <input type="text" id="f-manufacturer" placeholder="e.g. Dell, HP, Cisco..." oninput="onAcInput(this,'Manufacturer')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Manufacturer" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>Model</label>
      <div class="ac-wrap">
        <input type="text" id="f-model" placeholder="e.g. Latitude 5420..." oninput="onAcInput(this,'Model')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Model" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>Condition<span class="req">*</span></label>
      <select id="f-condition">
        <option value="">Select condition...</option>
        <option>New</option><option>Good</option><option>For repair</option><option>For disposal</option>
      </select>
    </div>
  </div>
  <div class="form-section">
    <div class="fsec-title">Assignment</div>
    <div class="field">
      <label>Status<span class="req">*</span></label>
      <select id="f-status">
        <option value="">Select status...</option>
        <option>Active</option><option>Inactive</option><option>In storage</option>
        <option>Deployed</option><option>Under repair</option><option>Disposed</option>
      </select>
    </div>
    <div class="field">
      <label>Account</label>
      <div class="ac-wrap">
        <input type="text" id="f-account" placeholder="e.g. IT, Finance..." oninput="onAcInput(this,'Account')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Account" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>Department</label>
      <div class="ac-wrap">
        <input type="text" id="f-department" placeholder="e.g. Operations..." oninput="onAcInput(this,'Department')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Department" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>Assigned To</label>
      <div class="ac-wrap">
        <input type="text" id="f-assigned" placeholder="Name or employee ID..." oninput="onAcInput(this,'Assigned')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Assigned" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="form-section">
    <div class="fsec-title">Purchase info</div>
    <div class="field">
      <label>Purchase Date</label>
      <input type="date" id="f-purchase-date">
    </div>
    <div class="field">
      <label>Vendor</label>
      <div class="ac-wrap">
        <input type="text" id="f-vendor" placeholder="e.g. CDW, Insight..." oninput="onAcInput(this,'Vendor')" onblur="hideAc()" autocomplete="off">
        <div class="ac-list" id="ac-Vendor" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="mb8"><button class="btn btn-primary" onclick="saveAsset()">Save asset</button></div>
  <button class="btn btn-secondary" onclick="showHome()">Cancel</button>
</div>
<div id="view-detail" class="view">
  <button class="back-btn" onclick="showHome()">&#8592; Back</button>
  <div id="detail-content"></div>
</div>
<div id="view-export" class="view">
  <div class="sec-title">Export data</div>
  <div class="export-card">
    <h3>Export to CSV</h3>
    <p>Matches your assetmgmt headers exactly. Ready to upload directly.</p>
    <div class="expfield">
      <label>Filter by department (optional)</label>
      <select id="exp-dept"><option value="">All departments</option></select>
    </div>
    <div class="expfield" style="margin-bottom:16px">
      <label>Filter by status (optional)</label>
      <select id="exp-status">
        <option value="">All statuses</option>
        <option>Active</option><option>Inactive</option><option>In storage</option>
        <option>Deployed</option><option>Under repair</option><option>Disposed</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="doExport()">Download CSV</button>
  </div>
  <div class="export-card">
    <h3>Summary</h3>
    <div id="export-summary" style="font-size:14px;color:var(--muted);line-height:1.9"></div>
  </div>
</div>
<button class="fab" id="fab" onclick="showAdd()">+</button>
<nav class="bnav">
  <button class="bnav-item active" id="nav-home" onclick="showHome()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="bnav-item" id="nav-add" onclick="showAdd()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Add
  </button>
  <button class="bnav-item" id="nav-export" onclick="showExport()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
</nav>
<div id="scanner-overlay" style="display:none" class="scanner-overlay">
  <div class="scanner-header">
    <div class="scanner-title">Scan barcode / QR</div>
    <button class="scanner-close" onclick="closeScanner()">&#10005;</button>
  </div>
  <div class="scanner-viewport">
    <video id="scanner-video" playsinline autoplay muted style="width:100%;height:100%;object-fit:cover;display:block"></video>
    <canvas id="scanner-canvas" style="display:none"></canvas>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div style="width:75%;height:120px;border:2px solid #38bdf8;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative">
        <div id="scan-line" style="position:absolute;left:8px;right:8px;height:2px;background:#38bdf8;top:50%;animation:scan 1.8s ease-in-out infinite"></div>
      </div>
    </div>
  </div>
  <div class="scanner-hint">Point camera at the barcode or QR code on the device</div>
  <div id="scan-debug" style="padding:8px 16px;background:rgba(0,0,0,.7);font-size:11px;color:#94a3b8;line-height:1.6;min-height:40px"></div>
  <div class="scanner-manual">
    <input type="text" id="manual-serial" placeholder="Or type serial number manually..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="scanner-manual-btn" onclick="useManualSerial()">Use this serial</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DB_KEY='assettrack_v1';
let db={assets:[],nextId:1};
function loadDB(){try{const s=localStorage.getItem(DB_KEY);if(s)db=JSON.parse(s)}catch(e){}}
function saveDB(){try{localStorage.setItem(DB_KEY,JSON.stringify(db))}catch(e){showToast('Storage error','error')}}
loadDB();

function getUnique(field){
  const keyMap={Type:'type',Description:'description',Manufacturer:'manufacturer',
    Model:'model',Account:'account',Department:'department',Assigned:'assigned',Vendor:'vendor'};
  const k=keyMap[field]||field.toLowerCase();
  return[...new Set(db.assets.map(a=>a[k]).filter(Boolean))].sort();
}

let editingId=null;
let activeFilter='All';

function setNav(name){
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('nav-'+name);
  if(el)el.classList.add('active');
  document.getElementById('fab').style.display=(name==='home')?'flex':'none';
}
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
}
function showHome(){
  editingId=null;
  showView('home');setNav('home');
  renderStats();renderList();renderChips();
}
function showAdd(){
  editingId=null;
  document.getElementById('form-title').textContent='New asset';
  clearForm();setTodayDate();
  showView('add');setNav('add');
}
function showExport(){
  showView('export');setNav('export');
  renderExportSummary();populateExpDept();
}

function setTodayDate(){
  const d=new Date();
  document.getElementById('f-purchase-date').value=d.toISOString().split('T')[0];
}

function renderStats(){
  const t=db.assets.length;
  const active=db.assets.filter(a=>a.status==='Active'||a.status==='Deployed').length;
  const types=[...new Set(db.assets.map(a=>a.type).filter(Boolean))].length;
  const attn=db.assets.filter(a=>a.condition==='For repair'||a.status==='Under repair').length;
  document.getElementById('stats-row').innerHTML=
    sc('Total assets',t,'in database')+
    sc('Active / deployed',active,'of '+t+' total')+
    sc('Asset types',types,'unique categories')+
    sc('Needs attention',attn,'for repair',attn>0?'var(--amber)':'var(--green)');
}
function sc(l,v,s,c){return`<div class="stat"><div class="stat-lbl">${l}</div><div class="stat-val"${c?` style="color:${c}"`:''}>${v}</div><div class="stat-sub">${s}</div></div>`}

function renderChips(){
  const types=['All',...new Set(db.assets.map(a=>a.type).filter(Boolean))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
  document.getElementById('filter-chips').innerHTML=types.map(t=>`<div class="chip${t===activeFilter?' active':''}" onclick="setFilter('${t.replace(/'/g,"\\'")}')">${t}</div>`).join('');
}
function setFilter(t){activeFilter=t;renderChips();renderList()}

function condBadge(c){
  const m={New:'new',Good:'good','For repair':'repair','For disposal':'disposal'};
  return`<span class="badge b-${m[c]||'good'}">${c}</span>`;
}
function statusBadge(s){
  const m={Active:'active',Inactive:'inactive','In storage':'storage',Deployed:'deployed','Under repair':'underrepair',Disposed:'disposed'};
  return`<span class="badge b-${m[s]||'inactive'}">${s}</span>`;
}
function renderList(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let list=db.assets;
  if(activeFilter!=='All')list=list.filter(a=>a.type===activeFilter);
  if(q)list=list.filter(a=>[a.description,a.serial,a.model,a.manufacturer,a.assigned,a.department].some(v=>(v||'').toLowerCase().includes(q)));
  list=[...list].reverse();
  const el=document.getElementById('asset-list');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">&#128230;</div><h3>${db.assets.length?'No results':'No assets yet'}</h3><p>${db.assets.length?'Try a different search or filter.':'Tap + to add your first asset.'}</p></div>`;
    return;
  }
  el.innerHTML=list.map(a=>`<div class="acard" onclick="showDetail(${a.id})">
    <div class="acard-top"><span class="acard-id">ID #${a.id}</span>${a.type?`<span class="badge b-type">${a.type}</span>`:''}</div>
    <div class="acard-desc">${a.description||'No description'}</div>
    <div class="acard-serial">S/N: ${a.serial||'—'}</div>
    <div class="acard-meta">${a.condition?condBadge(a.condition):''}${a.status?statusBadge(a.status):''}${a.department?`<span class="badge b-type">${a.department}</span>`:''}</div>
  </div>`).join('');
}

function showDetail(id){
  const a=db.assets.find(x=>x.id===id);
  if(!a)return;
  showView('detail');
  document.getElementById('fab').style.display='none';
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const rows=[
    ['Type',a.type],['Manufacturer',a.manufacturer],['Model',a.model],
    ['Account',a.account],['Department',a.department],['Assigned To',a.assigned],
    ['Purchase Date',a.purchaseDate],['Vendor',a.vendor],
    ['Added',new Date(a.created).toLocaleDateString()]
  ].filter(r=>r[1]).map(r=>`<div class="detail-row"><div class="detail-key">${r[0]}</div><div class="detail-val">${r[1]}</div></div>`).join('');
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-hero">
      <div class="detail-desc">${a.description||'No description'}</div>
      <div class="detail-serial">S/N: ${a.serial||'Not recorded'}</div>
      <div class="detail-badges">${a.condition?condBadge(a.condition):''}${a.status?statusBadge(a.status):''}</div>
    </div>
    <div class="detail-fields">${rows||'<div class="detail-row"><div class="detail-val" style="color:var(--muted)">No additional fields</div></div>'}</div>
    <div class="btn-row mb8">
      <button class="btn btn-secondary" onclick="editAsset(${id})">Edit</button>
      <button class="btn btn-danger" onclick="confirmDelete(${id})">Delete</button>
    </div>
    <button class="btn btn-secondary" onclick="showHome()">Back to list</button>`;
}

function editAsset(id){
  const a=db.assets.find(x=>x.id===id);if(!a)return;
  editingId=id;
  showView('add');setNav('add');
  document.getElementById('form-title').textContent='Edit asset';
  const set=(fid,val)=>{const el=document.getElementById(fid);if(el)el.value=val||''};
  set('f-serial',a.serial);set('f-type',a.type);set('f-description',a.description);
  set('f-manufacturer',a.manufacturer);set('f-model',a.model);set('f-condition',a.condition);
  set('f-status',a.status);set('f-account',a.account);set('f-department',a.department);
  set('f-assigned',a.assigned);set('f-purchase-date',a.purchaseDate);set('f-vendor',a.vendor);
}

function confirmDelete(id){
  if(confirm('Delete this asset? This cannot be undone.')){
    db.assets=db.assets.filter(a=>a.id!==id);
    saveDB();showToast('Asset deleted');showHome();
  }
}

function clearForm(){
  ['f-serial','f-type','f-description','f-manufacturer','f-model','f-account','f-department','f-assigned','f-vendor'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('f-condition').value='';
  document.getElementById('f-status').value='';
  document.getElementById('f-purchase-date').value='';
}

function saveAsset(){
  const g=id=>document.getElementById(id).value.trim();
  const serial=g('f-serial'),type=g('f-type'),desc=g('f-description');
  const cond=document.getElementById('f-condition').value;
  const status=document.getElementById('f-status').value;
  if(!serial||!type||!desc||!cond||!status){showToast('Fill in required fields (*)','error');return}
  const asset={
    id:editingId||db.nextId++,serial,type,description:desc,
    manufacturer:g('f-manufacturer'),model:g('f-model'),
    condition:cond,status,account:g('f-account'),department:g('f-department'),
    assigned:g('f-assigned'),purchaseDate:document.getElementById('f-purchase-date').value,
    vendor:g('f-vendor'),
    created:editingId?db.assets.find(a=>a.id===editingId)?.created||Date.now():Date.now()
  };
  if(editingId){const i=db.assets.findIndex(a=>a.id===editingId);if(i>=0)db.assets[i]=asset}
  else db.assets.push(asset);
  if(!editingId)db.nextId=Math.max(db.nextId,asset.id+1);
  saveDB();
  showToast(editingId?'Asset updated':'Asset saved','success');
  editingId=null;showHome();
}

function onAcInput(input,field){
  const listEl=document.getElementById('ac-'+field);
  const val=input.value.trim();
  if(!val){listEl.style.display='none';return}
  const low=val.toLowerCase();
  const matches=getUnique(field).filter(v=>v.toLowerCase().includes(low));
  const existing=getUnique(field).map(v=>v.toLowerCase());
  const showNew=val&&!existing.includes(low);
  if(!matches.length&&!showNew){listEl.style.display='none';return}
  listEl.innerHTML=[
    ...matches.map(m=>`<div class="ac-item" onmousedown="pickAc('${field}','${m.replace(/'/g,"\\'")}',event)">${m}</div>`),
    showNew?`<div class="ac-item ac-new" onmousedown="pickAc('${field}','${val.replace(/'/g,"\\'")}',event)">+ Add &ldquo;${val}&rdquo;</div>`:''
  ].join('');
  listEl.style.display='block';
}
function pickAc(field,val,e){
  if(e)e.preventDefault();
  const map={Type:'f-type',Description:'f-description',Manufacturer:'f-manufacturer',
    Model:'f-model',Account:'f-account',Department:'f-department',Assigned:'f-assigned',Vendor:'f-vendor'};
  const el=document.getElementById(map[field]);
  if(el)el.value=val;
  document.getElementById('ac-'+field).style.display='none';
}
function hideAc(){setTimeout(()=>document.querySelectorAll('.ac-list').forEach(l=>l.style.display='none'),150)}

let scanStream=null;
let scanAnimFrame=null;
let barcodeDetector=null;

function dbg(msg){
  const el=document.getElementById('scan-debug');
  if(el){el.innerHTML+=(el.innerHTML?'<br>':'')+msg;}
  console.log('[SCAN]',msg);
}

async function openScanner(){
  const el=document.getElementById('scan-debug');
  if(el)el.innerHTML='';
  document.getElementById('scanner-overlay').style.display='flex';
  document.getElementById('manual-serial').value='';
  const video=document.getElementById('scanner-video');
  const canvas=document.getElementById('scanner-canvas');
  const ctx=canvas.getContext('2d');

  try{
    if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
    if(scanAnimFrame){cancelAnimationFrame(scanAnimFrame);scanAnimFrame=null;}

    dbg('Starting camera...');
    try{
      scanStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:'environment'},width:{ideal:3840},height:{ideal:2160}}
      });
    }catch(e){
      dbg('4K failed, trying 1080p...');
      try{
        scanStream=await navigator.mediaDevices.getUserMedia({
          video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:1080}}
        });
      }catch(e2){
        dbg('1080p failed, trying any...');
        scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      }
    }

    video.srcObject=scanStream;
    await video.play();
    const track=scanStream.getVideoTracks()[0];
    const settings=track.getSettings();
    dbg('Camera: '+settings.width+'x'+settings.height);

    // Try to apply zoom (2x) and best focus mode available
    setTimeout(async()=>{
      try{
        const caps=track.getCapabilities();
        dbg('Focus modes: '+(caps.focusMode||[]).join(','));
        dbg('Zoom range: '+(caps.zoom?caps.zoom.min+'-'+caps.zoom.max:'none'));
        const adv={};
        // Focus: prefer continuous, then macro, else leave as-is
        if(caps.focusMode?.includes('continuous')) adv.focusMode='continuous';
        else if(caps.focusMode?.includes('macro')) adv.focusMode='macro';
        // Zoom: use 1.5x if supported to make barcode bigger in frame
        if(caps.zoom&&caps.zoom.max>=1.5){
          adv.zoom=Math.min(2.0, caps.zoom.max);
          dbg('Applying zoom: '+adv.zoom+'x');
        }
        if(Object.keys(adv).length) await track.applyConstraints({advanced:[adv]});
        dbg('Constraints applied: '+JSON.stringify(adv));
      }catch(e){dbg('Constraint err: '+e.message)}
    },700);

    // Check BarcodeDetector
    const hasNative='BarcodeDetector' in window;
    dbg('BarcodeDetector: '+(hasNative?'YES':'NO'));

    if(hasNative){
      const supported=await BarcodeDetector.getSupportedFormats().catch(()=>[]);
      dbg('Formats: '+supported.slice(0,4).join(',')+' +more');
      const formats=supported.length?supported:['code_128','code_39','ean_13','ean_8','upc_a','upc_e','qr_code'];
      barcodeDetector=new BarcodeDetector({formats});
      let frameCount=0;
      let detected=false;
      async function detectFrame(){
        if(!scanStream||detected)return;
        if(video.readyState>=2){
          frameCount++;
          if(frameCount%30===0) dbg('Scanning... frame '+frameCount);
          canvas.width=video.videoWidth;
          canvas.height=video.videoHeight;
          ctx.drawImage(video,0,0);
          try{
            const barcodes=await barcodeDetector.detect(canvas);
            if(barcodes.length>0){
              detected=true;
              const val=barcodes[0].rawValue;
              dbg('Found: '+val);
              closeScanner();
              document.getElementById('f-serial').value=val;
              showToast('Captured: '+val,'success');
              return;
            }
          }catch(e){if(frameCount<5)dbg('Detect err: '+e.message)}
        }
        scanAnimFrame=requestAnimationFrame(detectFrame);
      }
      detectFrame();
    } else {
      dbg('Loading ZXing fallback...');
      if(!window.ZXingLoaded){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/umd/index.min.js';
          s.onload=()=>{window.ZXingLoaded=true;dbg('ZXing loaded');res()};
          s.onerror=(e)=>{dbg('ZXing load failed');rej(e)};
          document.head.appendChild(s);
        });
      }
      const codeReader=new ZXingBrowser.BrowserMultiFormatReader();
      codeReader.decodeFromVideoElement(video).then(result=>{
        if(result){
          const val=result.getText();
          dbg('ZXing found: '+val);
          closeScanner();
          document.getElementById('f-serial').value=val;
          showToast('Captured: '+val,'success');
        }
      }).catch(e=>dbg('ZXing err: '+e.message));
      video._zxing=codeReader;
    }
  }catch(e){
    dbg('ERROR: '+e.message);
    showToast('Camera error — type serial manually');
  }
}

function closeScanner(){
  document.getElementById('scanner-overlay').style.display='none';
  if(scanAnimFrame){cancelAnimationFrame(scanAnimFrame);scanAnimFrame=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  const video=document.getElementById('scanner-video');
  if(video._zxing){try{video._zxing.reset()}catch(e){}video._zxing=null;}
  video.srcObject=null;
  barcodeDetector=null;
}
function useManualSerial(){
  const val=document.getElementById('manual-serial').value.trim();
  if(!val){showToast('Enter a serial number','error');return}
  document.getElementById('f-serial').value=val;
  closeScanner();showToast('Serial: '+val,'success');
}

function populateExpDept(){
  const sel=document.getElementById('exp-dept');
  const depts=[...new Set(db.assets.map(a=>a.department).filter(Boolean))].sort();
  sel.innerHTML='<option value="">All departments</option>'+depts.map(d=>`<option>${d}</option>`).join('');
}
function renderExportSummary(){
  const el=document.getElementById('export-summary');
  if(!db.assets.length){el.innerHTML='No assets in database yet.';return}
  const byStatus={};
  db.assets.forEach(a=>{const k=a.status||'Unknown';byStatus[k]=(byStatus[k]||0)+1});
  el.innerHTML=`<strong>${db.assets.length}</strong> total assets<br>`+
    Object.entries(byStatus).map(([s,n])=>`${s}: <strong>${n}</strong>`).join('<br>');
}
function doExport(){
  const dept=document.getElementById('exp-dept').value;
  const status=document.getElementById('exp-status').value;
  let list=db.assets.filter(a=>(!dept||a.department===dept)&&(!status||a.status===status));
  if(!list.length){showToast('No matching assets','error');return}
  const H=['Asset ID','Type','Description','Serial','Manufacturer','Model','Condition','Status','Account','Department','Assigned To','Purchase Date','Last Maint.','Next Maint.','Vendor','Warranty','Notes'];
  const esc=v=>`"${(v||'').replace(/"/g,'""')}"`;
  const rows=list.map(a=>[
    '',a.type,a.description,a.serial,a.manufacturer,a.model,
    a.condition,a.status,a.account,a.department,a.assigned,
    a.purchaseDate,'','',a.vendor,'',''
  ].map(esc).join(','));
  const csv=[H.join(','),...rows].join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='assets-'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Exported '+list.length+' assets','success');
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2800);
}

renderStats();renderList();renderChips();
</script>
